<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Soft Pink Planner - Enter to Save</title>
<style>
  :root {
    --bg-main: #ffffff;
    --main-pink: #fcc3d2;      
    --light-pink: #fff5f7;     
    --text-pink: #ff8fa3;      
    --text-dark: #555;
    --shadow: 0 2.5px 15px rgba(255, 182, 201, 0.25);
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background-color: #fdfdfd;
  }

  .calendar-wrapper {
    width: 360px; padding: 25px; background: var(--bg-main);
    border-radius: 30px; position: relative; border: 1px solid var(--main-pink);
    box-shadow: var(--shadow);
  }

  .month { text-align: center; font-size: 22px; font-weight: 800; color: var(--text-pink); margin-bottom: 20px; text-transform: lowercase; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 13px; font-weight: 600; color: var(--main-pink); margin-bottom: 15px; }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); }

  .day {
    position: relative; height: 65px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 12px; transition: 0.2s;
  }
  .day:hover { background: var(--light-pink); }

  .day span {
    width: 34px; height: 34px; line-height: 34px; text-align: center;
    border-radius: 10px; font-size: 15px; color: var(--text-dark); z-index: 2;
  }

  .day.today span { border: 2.5px solid var(--main-pink); font-weight: 900; color: var(--text-pink); }
  .day.event span { background: var(--main-pink); color: #fff; font-weight: 600; }

  /* 동그라미 점 (dot) */
  .dot-container { 
    display: flex; gap: 4px; justify-content: center;
    position: absolute; bottom: 6px; width: 100%; z-index: 3;
  }
  .dot { width: 5px; height: 5px; background: var(--main-pink); border-radius: 50%; }

  /* 말풍선 (툴팁) */
  .tooltip {
    position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%) translateY(10px);
    background: white; padding: 12px 16px; border-radius: 18px;
    box-shadow: 0 4px 15px rgba(255, 182, 201, 0.3);
    font-size: 14px; color: var(--text-dark); white-space: nowrap;
    opacity: 0; visibility: hidden; transition: 0.2s; z-index: 100;
    border: 1px solid var(--main-pink); text-align: left;
  }
  .day:hover .tooltip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
  .tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 8px solid transparent; border-top-color: white; }

  /* To-do 모달 */
  #modalOverlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255, 255, 255, 0.5); display: none;
    justify-content: center; align-items: center; border-radius: 28px;
    z-index: 300; backdrop-filter: blur(4px);
  }
  .modal-content {
    background: white; padding: 22px; border-radius: 25px;
    width: 75%; border: 2px solid var(--main-pink); box-shadow: var(--shadow);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .modal-header h3 { margin: 0; font-size: 16px; color: var(--text-pink); font-weight: 800; }
  
  /* 입력창 디자인 변경 (버튼 제거 대응) */
  .input-group { display: flex; margin-bottom: 15px; }
  .modal-content input { 
    flex: 1; padding: 12px 15px; border: 2px solid var(--main-pink); 
    border-radius: 15px; outline: none; font-size: 14px;
    transition: 0.2s;
  }
  .modal-content input:focus { background-color: var(--light-pink); }

  /* 스크롤바 */
  .task-list-container { max-height: 180px; overflow-y: auto; padding-right: 5px; }
  .task-list-container::-webkit-scrollbar { width: 6px; }
  .task-list-container::-webkit-scrollbar-track { background: var(--light-pink); border-radius: 10px; }
  .task-list-container::-webkit-scrollbar-thumb { background: var(--main-pink); border-radius: 10px; }

  .task-item {
    background: white; border: 1.5px solid var(--light-pink); 
    padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; 
    font-size: 14px; font-weight: 500; color: #555;
    display: flex; justify-content: space-between; align-items: center;
  }
  .btn-del { color: var(--main-pink); cursor: pointer; border: none; background: none; font-size: 14px; font-weight: bold; }

  /* ✨ 수정된 하단 컨트롤 레이아웃 (간격 확보) */
.bottom-controls {
  display: flex;
  align-items: center;
  justify-content: center; /* 문구와 화살표를 중앙으로 */
  margin-top: 25px;
  position: relative; /* 새로고침 버튼 배치를 위한 기준 */
  gap: 15px; /* 👈 화살표와 문구 사이 간격을 넓게 설정 (image_11.png 반영) */
}

/* ✨ 수정된 화살표 버튼 스타일 (image_12.png 반영) */
.nav-btn {
  background: white;        /* 배경을 하얗게 */
  color: var(--main-pink);  /* 화살표 색상은 핑크 */
  border: 1.5px solid var(--main-pink); /* 👈 핑크색 테두리 추가 */
  border-radius: 8px;       /* 👈 둥근 모서리 */
  width: 32px;              /* 버튼 크기 고정 */
  height: 32px;
  cursor: pointer;
  font-size: 14px;          /* 화살표 크기 조절 */
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;     /* 부드러운 호버 효과 */
  box-shadow: 0 2px 5px rgba(255, 182, 201, 0.15); /* 얕은 그림자 */
}

.nav-btn:hover {
  background: var(--light-pink); /* 호버 시 연한 핑크 배경 */
  transform: translateY(-1px);  /* 살짝 들리는 효과 */
}

/* 중앙 문구 스타일 (기존 유지) */
#cheerMessage {
  font-size: 14px;
  color: var(--text-pink);
  font-weight: 800;
  min-width: 160px; /* 문구 길이에 따라 화살표가 움직이지 않게 고정 */
  text-align: center;
}

/* 새로고침 버튼 (기존 유지) */
#reload {
  position: absolute;
  right: 0;
  background: none; border: none; font-size: 18px;
  cursor: pointer; color: var(--main-pink);
}

</style>
</head>
<body>

<div class="calendar-wrapper">
  <div class="month" id="monthLabel"></div>
  <div class="weekdays"><div>m</div><div>t</div><div>w</div><div>t</div><div>f</div><div>s</div><div>s</div></div>
  <div class="days" id="days"></div>
  
<div class="bottom-controls">
  <button class="nav-btn" id="prev">◀</button>
  <div id="cheerMessage">오늘도 화이팅! 💪</div> <button class="nav-btn" id="next">▶</button>

  <button id="reload">⟳</button> </div>
  
  <div id="modalOverlay">
    <div class="modal-content">
      <div class="modal-header"><h3>to do list</h3><span style="cursor:pointer; font-weight:bold; color:var(--main-pink);" onclick="closeModal()">✕</span></div>
      <div class="input-group">
        <input type="text" id="taskInput" placeholder="할 일 입력 후 Enter..." onkeypress="if(event.key==='Enter') saveTask()">
      </div>
      <div id="taskList" class="task-list-container"></div>
    </div>
  </div>
</div>

<script>
  let currentDate = new Date();
  const daysEl = document.getElementById("days");
  const monthLabel = document.getElementById("monthLabel");
  const modal = document.getElementById("modalOverlay");
  const taskInput = document.getElementById("taskInput");
  const cheerMessage = document.getElementById("cheerMessage");
  let selectedDate = null;

  const messages = ["오늘도 잘 부탁해 ✨", "오늘도 화이팅! 💪", "행복한 하루 보내요 🌸", "할 수 있어요! 🌟", "잠시 쉬어가도 괜찮아요 ☕", "당신을 응원합니다 🎈"];
  let events = JSON.parse(localStorage.getItem('pink_notion_final') || '{}');

  function renderCalendar() {
    daysEl.innerHTML = "";
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const today = new Date();
    monthLabel.textContent = currentDate.toLocaleString("en-US", { month: "long", year: "numeric" }).toLowerCase();

    let firstDay = new Date(year, month, 1).getDay();
    firstDay = (firstDay === 0) ? 6 : firstDay - 1; 
    const lastDate = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) daysEl.appendChild(document.createElement("div"));

    for (let d = 1; d <= lastDate; d++) {
      const cell = document.createElement("div");
      cell.className = "day";
      const dateStr = `${year}-${String(month + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      cell.dataset.date = dateStr;
      if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) cell.classList.add("today");

      const span = document.createElement("span");
      span.textContent = d;
      cell.appendChild(span);

      if (events[dateStr] && events[dateStr].length > 0) {
        cell.classList.add("event");
        const tooltip = document.createElement("div");
        tooltip.className = "tooltip";
        tooltip.innerHTML = events[dateStr].map(t => `• ${t}`).join("<br>");
        cell.appendChild(tooltip);

        const dotContainer = document.createElement("div");
        dotContainer.className = "dot-container";
        for(let i=0; i<Math.min(events[dateStr].length, 3); i++) {
          dotContainer.innerHTML += `<div class="dot"></div>`;
        }
        cell.appendChild(dotContainer);
      }
      daysEl.appendChild(cell);
    }
  }

  // 새로고침 버튼 (오늘로 이동 + 랜덤 문구)
  document.getElementById("reload").onclick = () => {
    const btn = document.getElementById("reload");
    btn.style.transition = "transform 0.5s ease";
    btn.style.transform = "rotate(360deg)";
    
    currentDate = new Date(); 
    renderCalendar();

    cheerMessage.textContent = messages[Math.floor(Math.random() * messages.length)];
    setTimeout(() => { btn.style.transition = "none"; btn.style.transform = "rotate(0deg)"; }, 500);
  };

  daysEl.onclick = (e) => {
    const dayEl = e.target.closest(".day");
    if (!dayEl) return;
    selectedDate = dayEl.dataset.date;
    updateTaskListUI();
    modal.style.display = "flex";
    taskInput.focus();
  };

  function updateTaskListUI() {
    const container = document.getElementById("taskList");
    container.innerHTML = "";
    if (events[selectedDate]) {
      events[selectedDate].forEach((t, i) => {
        container.innerHTML += `<div class="task-item"><span>${t}</span><button class="btn-del" onclick="deleteTask(${i})">✕</button></div>`;
      });
    }
  }

  function saveTask() {
    const val = taskInput.value.trim();
    if (val) {
      if (!events[selectedDate]) events[selectedDate] = [];
      events[selectedDate].push(val);
      localStorage.setItem('pink_notion_final', JSON.stringify(events));
      taskInput.value = "";
      updateTaskListUI();
      renderCalendar();
    }
  }

  function deleteTask(idx) {
    events[selectedDate].splice(idx, 1);
    if (events[selectedDate].length === 0) delete events[selectedDate];
    localStorage.setItem('pink_notion_final', JSON.stringify(events));
    updateTaskListUI();
    renderCalendar();
  }

  function closeModal() { modal.style.display = "none"; }
  document.getElementById("prev").onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); };
  document.getElementById("next").onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); };

  renderCalendar();
</script>
</body>
</html>
