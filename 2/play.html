<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lofi Player</title>

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Pretendard', sans-serif;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }

        /* 배경 블러 및 어둡기 */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .player {
            position: relative;
            z-index: 1;
            width: 90%; 
            max-width: 340px; 
            max-height: 95vh;
            padding: 24px;
            border-radius: 32px;
            /* 유리 질감 디자인 */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            color: white;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .widget-title {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.6;
            letter-spacing: 1.5px;
        }

        .add-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .add-btn:hover { opacity: 1; }

        .input-area {
            display: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 5px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 14px;
            border-radius: 12px;
            color: white;
            font-size: 12px;
            margin-bottom: 8px;
            outline: none;
        }

        .input-area button {
            width: 100%;
            background: #ff9c55;
            color: white;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .thumb {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            margin: 8px auto;
            background-size: cover;
            background-position: center;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
            background-color: #222;
        }

        .title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 5px 0;
            padding: 0 10px;
            opacity: 0.95;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        .play-btn {
            background: #ff9c55;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            min-width: 120px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .play-btn:active { transform: scale(0.96); }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .icon-btn:hover { background: rgba(255, 255, 255, 0.25); }

        .recent {
            text-align: left;
            font-size: 11px;
            flex-grow: 1;
            min-height: 80px;
            max-height: 180px;
            overflow-y: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .recent-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            opacity: 0.5;
            font-weight: 600;
        }

        .recent-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.05);
        }

        .recent-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
        }

        .item-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
        }

        .delete-item {
            opacity: 0;
            padding: 0 5px;
            font-size: 16px;
            margin-left: 8px;
        }

        .recent-item:hover .delete-item { opacity: 0.5; }
        .delete-item:hover { color: #ff5555; opacity: 1 !important; }

        .recent::-webkit-scrollbar { width: 3px; }
        .recent::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        /* 단순 iframe 재생을 위한 보이지 않는 컨테이너 */
        #yt-container { 
            position: absolute; 
            width: 0; 
            height: 0; 
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="player">
        <div class="top-bar">
            <span class="widget-title">LOFI PLAYER</span>
            <button class="add-btn" onclick="toggleInput()">+</button>
        </div>

        <div id="inputArea" class="input-area">
            <input type="text" id="videoUrlInput" placeholder="유튜브 주소를 입력하세요">
            <button onclick="handleAddVideo()">Load Music</button>
        </div>

        <div class="thumb" id="thumb"></div>
        <div class="title" id="title">음악을 선택해주세요</div>

        <div class="controls">
            <button class="play-btn" id="playBtn" onclick="playVideo()">Start</button>
            <button class="icon-btn" onclick="stopVideo()">⏸</button>
        </div>

        <div class="recent">
            <div class="recent-header">
                <strong>RECENTLY PLAYED</strong>
                <span style="cursor:pointer; text-decoration:underline; font-size: 10px;" onclick="clearAllRecent()">Clear</span>
            </div>
            <div id="recentList"></div>
        </div>
    </div>

    <div id="yt-container"></div>

    <script>
        let currentVideoId = "jfKfPfyJRdk"; // 기본 예시 곡

        function extractVideoId(url) {
            if (!url || typeof url !== "string") return null;
            try {
                const cleanUrl = url.trim();
                const parsedUrl = new URL(cleanUrl.startsWith('http') ? cleanUrl : 'https://' + cleanUrl);
                const v = parsedUrl.searchParams.get("v");
                if (v) return v;
                if (parsedUrl.hostname.includes("youtu.be")) return parsedUrl.pathname.replace("/", "");
                if (parsedUrl.pathname.includes("/embed/")) return parsedUrl.pathname.split("/embed/")[1];
            } catch (e) { return null; }
            return null;
        }

        // 가장 안정적인 iframe 교체 재생 방식
        function playVideo() {
            if (!currentVideoId) return;
            
            // 재생 버튼 텍스트 변경
            document.getElementById("playBtn").innerText = "Playing";

            document.getElementById("yt-container").innerHTML = `
                <iframe width="1" height="1" 
                    src="https://www.youtube.com/embed/${currentVideoId}?autoplay=1" 
                    allow="autoplay; encrypted-media" frameborder="0">
                </iframe>`;
        }

        // 정지 기능
        function stopVideo() {
            document.getElementById("yt-container").innerHTML = "";
            // 재생 버튼 텍스트 복구
            document.getElementById("playBtn").innerText = "Start";
        }

        function toggleInput() {
            const area = document.getElementById("inputArea");
            area.style.display = area.style.display === "block" ? "none" : "block";
        }

        function handleAddVideo() {
            const input = document.getElementById("videoUrlInput");
            const id = extractVideoId(input.value);
            if (id) {
                loadVideo(id);
                playVideo();
                input.value = "";
                toggleInput();
            } else {
                alert("올바른 유튜브 링크를 입력해주세요.");
            }
        }

        function loadVideo(id) {
            if (!id) return;
            currentVideoId = id;
            
            const thumbUrl = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
            document.body.style.backgroundImage = `url(${thumbUrl})`;
            document.getElementById("thumb").style.backgroundImage = `url(${thumbUrl})`;
            
            // 상태 초기화
            stopVideo();

            fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("title").innerText = data.title;
                    saveRecent(id, data.title);
                })
                .catch(() => {
                    document.getElementById("title").innerText = "Lofi Music";
                });
        }

        function saveRecent(id, title) {
            let recent = JSON.parse(localStorage.getItem("recentLofi")) || [];
            recent = recent.filter(item => item.id !== id);
            recent.unshift({ id, title });
            if (recent.length > 50) recent.pop();
            localStorage.setItem("recentLofi", JSON.stringify(recent));
            renderRecent();
        }

        function deleteRecentItem(e, id) {
            e.stopPropagation();
            let recent = JSON.parse(localStorage.getItem("recentLofi")) || [];
            recent = recent.filter(item => item.id !== id);
            localStorage.setItem("recentLofi", JSON.stringify(recent));
            renderRecent();
        }

        function clearAllRecent() {
            if (confirm("최근 목록을 초기화할까요?")) {
                localStorage.removeItem("recentLofi");
                renderRecent();
            }
        }

        function renderRecent() {
            const list = JSON.parse(localStorage.getItem("recentLofi")) || [];
            const container = document.getElementById("recentList");
            container.innerHTML = "";

            if (list.length === 0) {
                container.innerHTML = "<div style='font-size:11px; opacity:0.3; padding: 15px;'>목록이 비어 있습니다.</div>";
                return;
            }

            list.forEach(item => {
                const div = document.createElement("div");
                div.className = "recent-item";
                div.onclick = () => { loadVideo(item.id); playVideo(); };
                div.innerHTML = `
                    <div class="item-text" title="${item.title}">${item.title}</div>
                    <div class="delete-item" onclick="deleteRecentItem(event, '${item.id}')">×</div>
                `;
                container.appendChild(div);
            });
        }

        window.onload = () => {
            loadVideo(currentVideoId);
            renderRecent();
        };
    </script>
</body>
</html>
